name: Publish to PyPI and MCP Registry

# Tag a release to publish, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
# The tag (minus the leading "v") becomes the version for BOTH the PyPI package
# and the MCP registry entry, so they can never drift.
#
# Before tagging: move the accumulated CHANGELOG.md [Unreleased] entries into a
# new "## [x.y.z] - YYYY-MM-DD" section — it becomes the GitHub Release notes.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — used for BOTH PyPI trusted publishing and the MCP registry
      contents: write   # create the GitHub Release from the changelog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      # Make the git tag the single source of truth for the version.
      - name: Set version in pyproject.toml and server.json
        run: |
          uv version "$VERSION"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Build sdist + wheel
        run: uv build

      # PyPI trusted publishing: no token — uv uses the workflow's OIDC identity.
      # Requires a "pending publisher" configured on PyPI (see repo README / setup notes).
      - name: Publish to PyPI
        run: uv publish

      # The registry verifies the package exists on PyPI (it reads the mcp-name
      # marker from the PyPI description), so wait until the new version is live.
      - name: Wait for PyPI to index the release
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "https://pypi.org/pypi/poe-data-mcp/${VERSION}/json" > /dev/null; then
              echo "poe-data-mcp ${VERSION} is available on PyPI."
              exit 0
            fi
            echo "Not indexed yet (attempt $i)… waiting 10s"
            sleep 10
          done
          echo "Timed out waiting for PyPI to index poe-data-mcp ${VERSION}" >&2
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # OIDC auth: the workflow runs in charleslucas/poe-data-mcp, so the registry
      # authorizes the io.github.charleslucas/* namespace with no stored secret.
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # Turn this version's CHANGELOG.md section into the GitHub Release notes.
      # Runs last so a notes hiccup can't block the actual PyPI/registry publish.
      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Literal matching (no regex) — extract this version's section, stopping
          # at the next "## [" header or the "[x.y.z]: <url>" reference footer.
          NOTES=$(awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { flag=1; next }
            substr($0,1,4) == "## [" { flag=0 }
            substr($0,1,1) == "[" && index($0, "]:") > 0 { flag=0 }
            flag { print }
          ' CHANGELOG.md)
          [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ] && NOTES="Release v${VERSION}"
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "$NOTES"
